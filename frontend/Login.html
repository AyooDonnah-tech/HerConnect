<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Login | Her Connect</title>

<link
rel="stylesheet"
href="register-login.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="auth-container">

<div class="auth-left">
  

<div id="logo"> <img src="images/H (6).png" alt="Her Connect"></div>
<h1> Her Connect</h1>

<p>

Connect with ambitious women,
grow your career,
and build lifelong sisterhood.

</p>

</div>


<div class="auth-right">

<form
id="loginForm"
class="auth-card">

<h2>

Welcome Back

</h2>

<p>

Login to continue

</p>


<input
id="email"
type="email"
placeholder="Email"
required>


<input
id="password"
type="password"
placeholder="Password"
required>


<button type="submit">

Login

</button>


<div class="divider">

OR

</div>


<button
type="button"
class="google-btn">

Continue with Google

</button>


<p>

Don't have an account?

<a href="register.html">

Register

</a>

</p>


</form>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
